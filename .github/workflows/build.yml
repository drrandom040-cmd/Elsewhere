name: Build Elsewhere APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Setup Flutter project
        run: |
          flutter create --org com.drrandom.elsewhere --project-name elsewhere /tmp/scaffold
          cp -r /tmp/scaffold/android $GITHUB_WORKSPACE/android
          cp -r /tmp/scaffold/ios $GITHUB_WORKSPACE/ios
          ls $GITHUB_WORKSPACE
      - run: flutter pub get
      - name: Build APK
        run: yes | flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: elsewhere-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
