name: Build Elsewhere APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.drrandom.elsewhere --project-name elsewhere temp_project
          cp -r temp_project/android .
          cp -r temp_project/ios .
          rm -rf temp_project
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: elsewhere-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
