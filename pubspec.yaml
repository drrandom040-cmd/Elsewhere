name: elsewhere
description: A writing companion app for novelists, short stories and articles
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  google_sign_in: ^6.2.1

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # File & Image picking
  file_picker: ^8.1.2
  image_picker: ^1.0.7
  image: ^4.1.3

  # YouTube

  # Utilities
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  uuid: ^4.3.3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
